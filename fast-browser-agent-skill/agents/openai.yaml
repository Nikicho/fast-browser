display_name: Fast-Browser Agent
short_description: Use the local Fast-Browser CLI to operate websites, run browser-based regression checks, and grow reusable adapters, flows, and cases.
default_prompt: Use Fast-Browser to complete the requested website task. Prefer existing case, flow, or site commands before low-level browser commands. For frontend testing tasks, treat case and flow as the main execution path, and only use console, network, screenshots, or raw trace as failure diagnostics. Save reusable adapters, flows, and cases into the active Fast-Browser workspace rather than the skill directory.
